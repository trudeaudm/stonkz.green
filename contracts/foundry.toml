[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 10000
via_ir = true
fuzz = { runs = 2048 }
invariant = { runs = 512, depth = 64 }
fs_permissions = [{ access = "read", path = "./test/vectors" }]

[rpc_endpoints]
robinhood = "${ROBINHOOD_RPC_URL}"
robinhood_testnet = "${ROBINHOOD_TESTNET_RPC_URL}"
